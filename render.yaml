services:
  - type: web
    name: natural-solver-backend
    runtime: node
    rootDir: backend
    region: oregon
    plan: free
    buildCommand: npm install && python3 -m venv /opt/render/project/src/optimate_venv && /opt/render/project/src/optimate_venv/bin/pip install -r ../optimate/requirements.txt
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: OPTIMATE_PYTHON
        value: /opt/render/project/src/optimate_venv/bin/python
      - key: OPTIMATE_DIR
        value: /opt/render/project/src/optimate
      - key: STACK_AI_PUBLIC_KEY
        sync: false
      - key: STACK_AI_ORG_ID
        sync: false
      - key: STACK_AI_FLOW_ID
        sync: false
