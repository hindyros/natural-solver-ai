services:
  - type: web
    name: natural-solver-backend
    runtime: node
    rootDir: backend
    region: oregon
    plan: free
    buildCommand: npm install && python3 -m pip install --break-system-packages -r ../optimate/requirements.txt
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: STACK_AI_PUBLIC_KEY
        sync: false
      - key: STACK_AI_ORG_ID
        sync: false
      - key: STACK_AI_FLOW_ID
        sync: false
