services:
  - type: web
    name: natural-solver-backend
    runtime: docker
    region: oregon
    plan: free
    healthCheckPath: /health
    envVars:
      - key: BACKEND_PROVIDER
        sync: false
      - key: OPTIMATE_LLM_PROVIDER
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: STACK_AI_PUBLIC_KEY
        sync: false
      - key: STACK_AI_ORG_ID
        sync: false
      - key: STACK_AI_FLOW_ID
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
